title: Creacion de cuenta via linea de comandos (net user /add)
id: 7c2a1e10-3b44-4f0a-9d21-0a1b2c3d4e0a
status: experimental
description: |
  Detecta la creacion de cuentas de usuario por linea de comandos (T1136.001), tecnica que Akira
  usa para establecer persistencia (p.ej. net.exe user /add John Jhn1234Abc!). En un endpoint o DC
  normal la creacion de cuentas se hace por consola de administracion, no por net user -> sospechoso.
  Corroborar con Security 4720 (cuenta creada) en el DC. Derivada del informe CTI de Akira (AA24-109A).
references:
  - https://attack.mitre.org/techniques/T1136/001/
author: Jose Quintero
date: 2026-06-20
logsource:
  category: process_creation
  product: windows
detection:
  selection_args:
    CommandLine|contains|all:
      - 'user'
      - '/add'
  selection_net:
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
  condition: selection_args and selection_net
fields:
  - CommandLine
  - Image
  - ParentImage
falsepositives:
  - Scripts de aprovisionamiento legitimos (deberian originarse en servidores de gestion conocidos)
level: medium
tags:
  - attack.persistence
  - attack.t1136.001
