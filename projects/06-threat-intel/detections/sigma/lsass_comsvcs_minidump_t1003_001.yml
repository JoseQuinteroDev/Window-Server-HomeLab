title: Volcado de LSASS (comsvcs.dll MiniDump / procdump)
id: 7c2a1e10-3b44-4f0a-9d21-0a1b2c3d4e07
status: experimental
description: |
  Detecta el volcado de la memoria de LSASS para extraer credenciales (T1003.001). Akira usa
  esta via cuando el Kerberoasting falla: rundll32 con comsvcs.dll y la funcion MiniDump (por
  nombre o por ordinal de export, #24 / #+24), seguido de Mimikatz. Cubre tambien la via
  alternativa procdump -ma lsass. Derivada del informe CTI de Akira (CISA AA24-109A).
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://lolbas-project.github.io/lolbas/Libraries/comsvcs/
author: Jose Quintero
date: 2026-06-20
logsource:
  category: process_creation
  product: windows
detection:
  selection_comsvcs:
    CommandLine|contains: 'comsvcs'
    CommandLine|contains:
      - 'MiniDump'
      - '#24'
      - '#+24'
  selection_procdump:
    CommandLine|contains: 'procdump'
    CommandLine|contains:
      - 'lsass'
      - '-ma'
      - '-mm'
  condition: selection_comsvcs or selection_procdump
fields:
  - CommandLine
  - Image
  - ParentImage
falsepositives:
  - Diagnostico legitimo de volcados de memoria por parte de soporte/IT (raro; deberia justificarse)
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
