title: Reconocimiento de Active Directory (nltest / net group)
id: 7c2a1e10-3b44-4f0a-9d21-0a1b2c3d4e08
status: experimental
description: |
  Detecta el reconocimiento de dominio que Akira ejecuta tras conseguir acceso: nltest /dclist:
  para enumerar controladores de dominio (T1018) y nltest /domain_trusts para mapear confianzas
  (T1482), ademas de la enumeracion de grupos privilegiados con net group "Domain Admins" /domain.
  Estos binarios nativos raramente se usan de forma interactiva en un endpoint normal -> alta senal.
  Derivada del informe CTI de Akira (CISA AA24-109A).
references:
  - https://attack.mitre.org/techniques/T1018/
  - https://attack.mitre.org/techniques/T1482/
author: Jose Quintero
date: 2026-06-20
logsource:
  category: process_creation
  product: windows
detection:
  selection_nltest:
    Image|endswith: '\nltest.exe'
    CommandLine|contains:
      - '/dclist'
      - '/domain_trusts'
      - '/trusted_domains'
      - '/dsgetdc'
  selection_netgroup:
    CommandLine|contains|all:
      - 'group'
      - '/domain'
    Image|endswith:
      - '\net.exe'
      - '\net1.exe'
  condition: selection_nltest or selection_netgroup
fields:
  - CommandLine
  - Image
  - ParentImage
falsepositives:
  - Herramientas de inventario/administracion de AD ejecutadas desde una estacion de gestion conocida
level: medium
tags:
  - attack.discovery
  - attack.t1018
  - attack.t1482
