title: Manipulacion de Microsoft Defender por linea de comandos
id: 7c2a1e10-3b44-4f0a-9d21-0a1b2c3d4e03
status: experimental
description: |
  Detecta intentos de debilitar Defender desde la linea de comandos: anadir exclusiones
  (Add-MpPreference -ExclusionPath/Process) o desactivar la proteccion en tiempo real.
  Es exactamente el TTP del incidente real de origen (el atacante se auto-excluyo).
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: Jose Quintero
date: 2026-06-14
logsource:
  category: process_creation
  product: windows
  definition: 'Sysmon EID 1 o Security 4688 con linea de comandos habilitada'
detection:
  selection:
    CommandLine|contains:
      - 'Add-MpPreference'
      - 'Set-MpPreference'
      - '-ExclusionPath'
      - '-ExclusionProcess'
      - '-ExclusionExtension'
      - '-DisableRealtimeMonitoring'
      - 'DisableBehaviorMonitoring'
  condition: selection
fields:
  - CommandLine
  - ParentImage
  - User
falsepositives:
  - Administradores anadiendo exclusiones legitimas (deberia ser un proceso controlado)
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.001
