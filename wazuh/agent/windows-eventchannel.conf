<!--
  ============================================================================
   Wazuh agent (Windows) - ingesta de eventchannels para el lab corp.local
   Pegar estos bloques dentro de <ossec_config> en:
       C:\Program Files (x86)\ossec-agent\ossec.conf      (DC01 y WIN11)
   y reiniciar el agente:   Restart-Service WazuhSvc
  ----------------------------------------------------------------------------
   Requisitos previos (ya cumplidos en el lab por la GPO Audit-Baseline + Sysmon):
     - Auditoria avanzada: 4688 (+cmdline), 4624/25, 4768, 4769, 4720
     - PowerShell Script Block Logging (4104)
     - Sysmon desplegado (canal Microsoft-Windows-Sysmon/Operational)
  ============================================================================
-->

<!-- Eventos de seguridad de Windows: logon, proceso (4688+cmdline), Kerberos 4768/4769, etc. -->
<localfile>
  <location>Security</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- Sysmon: creacion de procesos (EID 1, con linea de comandos, hash y linaje), red, etc. -->
<localfile>
  <location>Microsoft-Windows-Sysmon/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- PowerShell Script Block Logging (EID 4104) -> deteccion de ofuscacion -->
<localfile>
  <location>Microsoft-Windows-PowerShell/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- System: servicios nuevos (7045), etc. (util para persistencia / movimiento lateral) -->
<localfile>
  <location>System</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- Microsoft Defender Antivirus: deteccion (1116) y accion/bloqueo (1117) de malware/PUA.
     Anadido 2026-06-15: durante la validacion en WIN11, Defender detecto y bloqueo el
     certutil -urlcache (Trojan:Win32/Ceprolad.A) pero esos eventos NO llegaban al SIEM.
     Es telemetria de altisima senal (el propio EDR confirmando un bloqueo). -->
<localfile>
  <location>Microsoft-Windows-Windows Defender/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>

<!--
  NOTA DC01 vs WIN11:
    - DC01  es donde aterrizan 4768 (AS-REP) y 4769 (Kerberoasting) -> imprescindible su agente.
    - WIN11 aporta Sysmon EID 1 (cmdline alta senal), 4688 y PowerShell 4104.
  Ambos agentes apuntan al manager 10.10.10.20 (ver deploy-wazuh-runbook.md).
-->
